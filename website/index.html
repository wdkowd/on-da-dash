<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Top Section -->
    <div class="top-section">
        <img
            id="mainImage"
            src="images/ZZ.png?v=1"
            alt="Main Image"
        >
    </div>

    <!-- Bottom Section -->
    <div class="bottom-section">

        <div class="tabs">
            <button class="tab active" data-image="images/AAPL_dripL.png">
                Tab 1
            </button>

            <button class="tab" data-image="images/AMD_dripL.png">
                Tab 2
            </button>

            <button class="tab" data-image="images/AMZN_dripL.png">
                Tab 3
            </button>

            <button class="tab" data-image="images/BA_dripL.png">
                Tab 4
            </button>
        </div>

        <div class="image-container">
            <img id="tabImage" src="images/AAPL_dripL.png">
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
