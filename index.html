<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Dashboard Viewer</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <!-- TOP IMAGE SECTION -->
    <div class="top-section">
        <img id="liveImage" src="/images/ZZ.png?t=0" />
    </div>

    <!-- TAB BAR -->
    <div class="tab-bar" id="tabBar"></div>

    <!-- BOTTOM DASHBOARD -->
    <div class="bottom-section">
        <iframe id="dashFrame"></iframe>
    </div>

    <!-- OPTS BUTTON -->
    <button id="optsBtn">Open Options Graph</button>

    <!-- MODAL -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span id="closeModal">&times;</span>
            <iframe id="optsFrame"></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
