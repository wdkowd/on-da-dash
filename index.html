<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X00 On Da Dash</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- TOP IMAGE -->

    <div class="top-section">
        <img
            id="mainImage"
            alt="Main Dashboard">
    </div>

    <!-- BOTTOM SECTION -->

    <div class="bottom-section">

        <div
            id="tabs"
            class="tabs">
        </div>

        <div class="iframe-container">

            <iframe
                id="dashFrame"
                frameborder="0">
            </iframe>

        </div>

        <div class="controls">

            <button id="openPlotBtn">
                OPTS CHAIN
            </button>

        </div>

    </div>

    <div id="plotModal" class="modal">

        <div class="modal-content">

            <span id="closeModal">&times;</span>

            <iframe
                id="plotFrame"
                width="100%"
                height="100%"
                frameborder="0">
            </iframe>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
