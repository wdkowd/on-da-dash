<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Trading Dashboard</title>

    <link
        rel="stylesheet"
        href="styles.css">

</head>

<body>

    <!-- TOP IMAGE -->

    <div class="top-section">

        <img
            id="mainImage"
            alt="Main Dashboard">

    </div>

    <!-- BOTTOM SECTION -->

    <div class="bottom-section">

        <!-- Tabs will be generated automatically -->

        <div
            id="tabs"
            class="tabs">
        </div>

        <!-- Selected tab image -->

        <div class="image-container">

            <img
                id="tabImage"
                alt="Tab Image">

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
